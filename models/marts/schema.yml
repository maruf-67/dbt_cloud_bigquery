version: 2

models:
    - name: dim_customers
      description: Customer dimension — one row per customer.
      columns:
          - name: customer_id
            tests:
                - not_null
                - unique
          - name: customer_name
            tests:
                - not_null
          - name: city
            tests:
                - not_null

    - name: dim_products
      description: Product dimension — one row per product.
      columns:
          - name: product_id
            tests:
                - not_null
                - unique
          - name: product_name
            tests:
                - not_null
          - name: category
            tests:
                - not_null
          - name: price
            tests:
                - not_null

    - name: fct_orders
      description: >
          Order fact table — one row per order, enriched with customer and product
          attributes and total_revenue computed as quantity × unit_price.
      columns:
          - name: order_id
            tests:
                - not_null
                - unique
          - name: customer_id
            tests:
                - not_null
          - name: product_id
            tests:
                - not_null
          - name: order_date
            tests:
                - not_null
          - name: quantity
            tests:
                - not_null
          - name: unit_price
            tests:
                - not_null
          - name: total_revenue
            tests:
                - not_null

    - name: fct_customer_orders
      description: >
          Customer-level aggregated fact table — one row per customer with lifetime
          order count and revenue metrics.
      columns:
          - name: customer_id
            tests:
                - not_null
                - unique
          - name: total_orders
          - name: lifetime_revenue
          - name: first_order_date
          - name: last_order_date
