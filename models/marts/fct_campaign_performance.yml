version: 2

models:
    - name: fct_campaign_performance
      description: Fact table for campaign spend and engagement performance metrics.
      columns:
          - name: campaign_id
            tests:
                - not_null
          - name: event_date
            tests:
                - not_null
          - name: spend
            tests:
                - not_null
          - name: ctr
          - name: cpc
