version: 2

models:
    - name: stg_orders
      description: Cleaned and typed order records from source.
      columns:
          - name: order_id
            tests:
                - not_null
                - unique
          - name: customer_id
            tests:
                - not_null
                - relationships:
                      arguments:
                          to: ref('stg_customers')
                          field: customer_id
          - name: product_id
            tests:
                - not_null
                - relationships:
                      arguments:
                          to: ref('stg_products')
                          field: product_id
          - name: quantity
            tests:
                - not_null
          - name: order_date
            tests:
                - not_null
