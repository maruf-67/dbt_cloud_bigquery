version: 2

sources:
    - name: ecommerce
      description: Raw e-commerce tables loaded into BigQuery dataset dbt_test.
      database: "{{ target.project }}"
      schema: "{{ var('ecommerce_schema', 'dbt_test') }}"
      tables:
          - name: customers
            description: Customer master data.
            columns:
                - name: customer_id
                  tests:
                      - not_null
                      - unique
                - name: name
                  tests:
                      - not_null
                - name: city
                  tests:
                      - not_null

          - name: products
            description: Product catalog.
            columns:
                - name: product_id
                  tests:
                      - not_null
                      - unique
                - name: product_name
                  tests:
                      - not_null
                - name: category
                  tests:
                      - not_null
                - name: price
                  tests:
                      - not_null

          - name: orders
            description: Customer orders transactional table.
            columns:
                - name: order_id
                  tests:
                      - not_null
                      - unique
                - name: customer_id
                  tests:
                      - not_null
                - name: product_id
                  tests:
                      - not_null
                - name: quantity
                  tests:
                      - not_null
                - name: order_date
                  tests:
                      - not_null
